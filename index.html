<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi página</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #050505;
      color: white;
      display: grid;
      place-items: center;
      height: 100vh;
      text-align: center;
    }
    .card {
      max-width: 700px;
      padding: 40px;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }
    p {
      font-size: 20px;
      color: #cfcfcf;
    }
    a {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 22px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hola, soy Alejandro 👋</h1>
    <p>Especialista en Power BI, análisis de datos, automatización e inteligencia de negocio.</p>
    <a href="mailto:tuemail@correo.com">Contáctame</a>
  </div>
</body>
</html>
